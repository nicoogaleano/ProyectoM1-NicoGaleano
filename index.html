<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas - Henry M1</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="icon" type="image/png" sizes="192x192" href="icono.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main>
        <h1>GENERADOR DE PALETAS</h1>
        <div class="divisor-neon"></div>
        <div class="controles">
            <label for="select-cantidad">Cantidad de colores</label>
            <select id="select-cantidad">
                <option value="6">6 colores</option>
                <option value="8">8 colores</option>
                <option value="9">9 colores</option>
            </select>
            <button id="btn-generar">Generar Paleta</button>            
        </div>
    <div class="toggle-container">
    <span class="toggle-label">Formato: HSL</span> <label class="switch">
        <input type="checkbox" id="toggle-formato">
        <span class="slider round"></span>
    </label>
    <span class="toggle-label">HEX</span>
</div>

        <div id="paleta" role="list"></div>

        <div id="toast" role="status">¡Copiado al portapapeles!</div>
    </main>

    <script src="JS/app.js"></script>
<footer class="cyber-footer">
        <div class="footer-content">
            <p>Desarrollado por <span class="autor-name">Nico Galeano</span></p>
            <div class="footer-links">
                <a href="https://github.com/nicoogaleano" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
                <a href="https://www.linkedin.com/in/nico-galeano-75798b3a4/?skipRedirect=true" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
            </div>
            <p class="footer-cohort">Henry Bootcamps • M1 Final Proyect</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
